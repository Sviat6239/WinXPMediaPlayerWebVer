<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/style.css">
    <title>WinXP Media Player</title>
</head>

<body>
    <div class="windowscontainer">
        <div class="sidewindow">
            <div class="mediaprocessing">
                <h3>Add New </h3>
                <input type="file" id="fileInput">
            </div>

            <div class="medialist">
                <h3>Your Media</h3>
            </div>
            <div class="playlists">
                <h3>Your Playlists</h3>
            </div>
        </div>
        <div class="generalwindow">
            <h1>Something</h1>
            <h2 id="nowplaying">Now playing: </h2>
        </div>
    </div>
    <div class="settingswindow">
        <h1>controlflow</h1>
        <button class="backward">⏪</button>
        <button class="play">▶️</button>
        <button class="pause">⏸️</button>
        <button class="forward">⏩</button>
        <button class="shufle">🔀</button>
        <button class="loop">🔁</button>
        <div class="volumecontrol">
            <h3>Volume</h3>
            <input type="range" min="1" max="100" value="50" class="slider" id="volumeSlider">
        </div>
    </div>
</body>
<script src="static/js/index.js"></script>
<script src="static/js/contlolFlow.js"></script>

</html>
